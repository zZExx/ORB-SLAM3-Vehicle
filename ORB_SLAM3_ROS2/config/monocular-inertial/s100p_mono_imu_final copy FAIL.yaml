%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters. Adjust them!
#--------------------------------------------------------------------------------------------
Camera.type: "PinHole"

# Camera calibration and distortion parameters (OpenCV)
Camera.fx: 190.61511853473925
Camera.fy: 191.64263326615690
Camera.cx: 316.33421762741654
Camera.cy: 250.55481206731980

Camera.k1: -0.015340035067568198
Camera.k2: -0.005344852225109581
Camera.p1: -0.00010019845916392146
Camera.p2: 0.0008947719711955501

# Camera resolution
Camera.width: 640
Camera.height: 480

# Camera frames per second
Camera.fps: 18.0

# Color order of the images (0: BGR, 1: RGB. It is ignored if images are grayscale)
Camera.RGB: 0

# Atlas save/load
System.SaveAtlasToFile: "s100p_imu_map"

# Transformation from camera to body-frame (imu)
Tbc: !!opencv-matrix
   rows: 4
   cols: 4 
   dt: f
   data: [0.02602676, 0.05934217, 0.99789835, 0.08575588,         -0.99943135, -0.01986274, 0.02724792, -0.00242198,         0.02143794, -0.99804007, 0.05879146, -0.04293315,         0.00000000, 0.00000000, 0.00000000, 1.00000000]
# IMU noise
IMU.NoiseGyro: 0.000176279523
IMU.NoiseAcc: 0.000723963291
IMU.GyroWalk: 0.000001878014
IMU.AccWalk: 0.000031277807
IMU.Frequency: 200

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------

# ORB Extractor: Number of features per image
ORBextractor.nFeatures: 800

# ORB Extractor: Scale factor between levels in the scale pyramid
ORBextractor.scaleFactor: 1.2

# ORB Extractor: Number of levels in the scale pyramid
ORBextractor.nLevels: 6

# ORB Extractor: Fast threshold
# Image is divided in a grid. At each cell FAST are extracted imposing a minimum response.
# Firstly we impose iniThFAST. If no corners are detected we impose a lower value minThFAST
# You can lower these values if your images have low contrast
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3
Viewer.ViewpointX: 0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -3.5
Viewer.ViewpointF: 500
